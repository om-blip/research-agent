name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v
        env:
          GROQ_API_KEY: "dummy-key-for-tests"
          CHROMA_PERSIST_DIR: "./chroma_test"

  import-check:
    name: Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check all modules import cleanly
        run: |
          python -c "from rag.chunker import chunk_text; print('chunker ok')"
          python -c "from rag.retriever import retrieve_for_prompt; print('retriever ok')"
          python -c "from agents.state import ResearchState; print('state ok')"
          python -c "from api.schemas import ResearchRequest; print('schemas ok')"
          python -c "from monitoring.metrics import get_metrics_response; print('metrics ok')"
        env:
          GROQ_API_KEY: "dummy-key-for-tests"
          CHROMA_PERSIST_DIR: "./chroma_test"

  eval-gate:
    name: RAG Quality Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eval suite
        run: python -m evals.eval_suite
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CHROMA_PERSIST_DIR: "./chroma_eval"

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: eval_results.json